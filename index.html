<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Clicker Game</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f4f4f9; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 10px; border-radius: 5px; border: 1px solid #ccc; }
        #clickButton { padding: 20px 40px; font-size: 24px; background-color: #4CAF50; color: white; border: none; }
        #clickButton:hover { background-color: #45a049; }
        #saveButton { background-color: #2196F3; color: white; border: none; }
        .stats { font-size: 18px; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <h1>Coin Clicker!</h1>
    <p class="stats">Coins: <span id="coinCount">0</span></p>
    <p>Coins per click: <span id="gpc">1</span></p>
    <p id="autoSpeedText" class="hidden">Autoclick: <span id="autoSpeed"></span></p>

    <button id="clickButton" onclick="clickMain()">Click Me!</button>
    <br>
    <button id="upgradeButton" onclick="buyUpgrade()">
        Upgrade (Cost: <span id="upgradeCost">10</span>)
    </button>
    <br>
    <button id="autoButton" onclick="buyAutoClicker()">
        Auto-Clicker Lvl <span id="autoLvl">0</span> (Cost: <span id="autoCost">50</span>)
    </button>
    <br>
    <button id="saveButton" onclick="saveGame()">Save Progress</button>

    <script>
        // Default Game State
        let gameData = {
            coins: 0,
            coinsPerClick: 1,
            upgradeCost: 10,
            autoLvl: 0,
            autoCost: 50
        };

        let autoInterval = null;

        // --- GAME LOGIC ---

        function clickMain() {
            gameData.coins += gameData.coinsPerClick;
            updateUI();
        }

        function buyUpgrade() {
            if (gameData.coins >= gameData.upgradeCost) {
                gameData.coins -= gameData.upgradeCost;
                gameData.coinsPerClick += 1;
                gameData.upgradeCost = Math.round(gameData.upgradeCost * 1.5);
                updateUI();
            } else {
                alert("Not enough coins!");
            }
        }

        function buyAutoClicker() {
            if (gameData.coins >= gameData.autoCost && gameData.autoLvl < 10) {
                gameData.coins -= gameData.autoCost;
                gameData.autoLvl++;
                gameData.autoCost = Math.round(gameData.autoCost * 2);
                startAutoClicker();
                updateUI();
            } else if (gameData.autoLvl >= 10) {
                alert("Auto-Clicker is maxed out!");
            } else {
                alert("Not enough coins!");
            }
        }

        function startAutoClicker() {
            if (autoInterval) clearInterval(autoInterval);
            
            // Speed formula: Level 1 = 1000ms, Level 10 = 100ms
            let speed = 1100 - (gameData.autoLvl * 100);
            
            autoInterval = setInterval(() => {
                gameData.coins += gameData.coinsPerClick;
                updateUI();
            }, speed);
        }

        function updateUI() {
            document.getElementById("coinCount").innerText = Math.floor(gameData.coins);
            document.getElementById("gpc").innerText = gameData.coinsPerClick;
            document.getElementById("upgradeCost").innerText = gameData.upgradeCost;
            
            // Auto Clicker UI
            document.getElementById("autoLvl").innerText = gameData.autoLvl;
            document.getElementById("autoCost").innerText = gameData.autoCost;
            
            // Show autoclick text only after first purchase
            if (gameData.autoLvl > 0) {
                let speed = ((1100 - (gameData.autoLvl * 100)) / 1000).toFixed(1);
                document.getElementById("autoSpeed").innerText = speed + "s";
                document.getElementById("autoSpeedText").classList.remove("hidden");
            }
            
            // Disable button when maxed
            if (gameData.autoLvl >= 10) {
                document.getElementById("autoButton").disabled = true;
            }
        }

        // --- SAVE/LOAD LOGIC ---

        function saveGame() {
            localStorage.setItem("coinClickerSave", JSON.stringify(gameData));
            console.log("Game Saved!");
        }

        function loadGame() {
            let savedData = JSON.parse(localStorage.getItem("coinClickerSave"));
            if (savedData !== null) {
                gameData = savedData;
                if (gameData.autoLvl > 0) startAutoClicker();
                updateUI();
            }
        }

        // Attempt to save when the user closes the tab or refreshes
        window.addEventListener("beforeunload", function () {
            saveGame();
        });

        // Load the game as soon as the page opens
        window.onload = function() {
            loadGame();
        };
    </script>
</body>
</html>
